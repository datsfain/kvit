version: 2

builds:
  - main: .
    binary: kvit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X kvit/cmd.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "kvit_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc

release:
  github:
    owner: datsfain
    name: kvit
